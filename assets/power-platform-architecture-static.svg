<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1400" viewBox="0 0 2200 1400"><rect width="100%" height="100%" fill="#F6F8FC"/><style>.t{font:700 44px Arial;fill:#0F172A}.s{font:22px Arial;fill:#475569}.h{font:700 24px Arial;fill:#0F172A}.b{font:17px Arial;fill:#475569}.l{font:700 18px Arial;fill:#2563EB}.w{font:700 24px Arial;fill:white}.wb{font:18px Arial;fill:#E2E8F0}</style><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#64748B"/></marker></defs><text x="70" y="82" class="t">Overall Power Platform Architecture — Portfolio Example</text><text x="72" y="122" class="s">Environment strategy, pipelines, DLP, security groups, onboarding, monitoring, and production operations.</text><rect x="55" y="145" width="2090" height="1195" rx="28" fill="#fff" stroke="#E2E8F0"/><text x="85" y="193" class="h">Microsoft 365 / Power Platform Tenant</text><rect x="90" y="220" width="340" height="270" rx="22" fill="#EDE9FE" stroke="#CBD5E1" stroke-width="2"/><text x="112" y="262" class="h">Identity & Access</text><foreignObject x="112" y="288" width="296" height="190"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Entra groups: Dev makers, Test/UAT users, Prod users, Prod admins/support</div></foreignObject><rect x="90" y="525" width="340" height="230" rx="22" fill="#fff" stroke="#CBD5E1" stroke-width="2"/><text x="112" y="567" class="h">Onboarding / Offboarding</text><foreignObject x="112" y="593" width="296" height="150"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Group membership, license, security role, app sharing, and access removal</div></foreignObject><rect x="90" y="790" width="340" height="210" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/><text x="112" y="832" class="h">Maker Governance</text><foreignObject x="112" y="858" width="296" height="130"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Maker intake, owners, naming standards, and solution rules</div></foreignObject><rect x="510" y="275" width="260" height="170" rx="22" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="2"/><text x="532" y="317" class="h">Developer Env</text><foreignObject x="532" y="343" width="216" height="90"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Personal build, experiments, unit testing</div></foreignObject><rect x="830" y="275" width="260" height="170" rx="22" fill="#FFEDD5" stroke="#CBD5E1" stroke-width="2"/><text x="852" y="317" class="h">Sandbox</text><foreignObject x="852" y="343" width="216" height="90"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Early feature test and safe breaking changes</div></foreignObject><rect x="1150" y="275" width="260" height="170" rx="22" fill="#DCFCE7" stroke="#CBD5E1" stroke-width="2"/><text x="1172" y="317" class="h">DEV</text><foreignObject x="1172" y="343" width="216" height="90"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Unmanaged solution and active development</div></foreignObject><rect x="1470" y="275" width="260" height="170" rx="22" fill="#EDE9FE" stroke="#CBD5E1" stroke-width="2"/><text x="1492" y="317" class="h">TEST / UAT</text><foreignObject x="1492" y="343" width="216" height="90"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Managed solution and UAT approval gate</div></foreignObject><rect x="1790" y="275" width="260" height="170" rx="22" fill="#FEE2E2" stroke="#CBD5E1" stroke-width="2"/><text x="1812" y="317" class="h">PROD</text><foreignObject x="1812" y="343" width="216" height="90"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Managed solution, users, support, monitoring</div></foreignObject><rect x="510" y="500" width="1540" height="160" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/><text x="532" y="542" class="h">Power Platform Pipelines / ALM</text><foreignObject x="532" y="568" width="1496" height="80"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">DEV → TEST/UAT → PROD, with solution checker, approvals, env variables, connection references, and source control</div></foreignObject><rect x="510" y="710" width="430" height="255" rx="22" fill="#fff" stroke="#CBD5E1" stroke-width="2"/><text x="532" y="752" class="h">Solution Package</text><foreignObject x="532" y="778" width="386" height="175"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Apps, flows, tables, connectors, environment variables, roles, and app sharing</div></foreignObject><rect x="980" y="710" width="430" height="255" rx="22" fill="#CCFBF1" stroke="#CBD5E1" stroke-width="2"/><text x="1002" y="752" class="h">Data & Integration Layer</text><foreignObject x="1002" y="778" width="386" height="175"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Dataverse, SharePoint, SQL/ERP/APIs, gateway, Azure Functions, custom connectors</div></foreignObject><rect x="1450" y="710" width="600" height="255" rx="22" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="2"/><text x="1472" y="752" class="h">Production Apps & Users</text><foreignObject x="1472" y="778" width="556" height="175"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Users access apps by Entra group; roles control data; admins monitor failures and KPIs</div></foreignObject><rect x="510" y="1015" width="365" height="235" rx="22" fill="#FEE2E2" stroke="#CBD5E1" stroke-width="2"/><text x="532" y="1057" class="h">DLP Policies</text><foreignObject x="532" y="1083" width="321" height="155"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Applied to DEV/TEST/PROD; separates business and non-business connectors</div></foreignObject><rect x="900" y="1015" width="365" height="235" rx="22" fill="#EDE9FE" stroke="#CBD5E1" stroke-width="2"/><text x="922" y="1057" class="h">Security Groups</text><foreignObject x="922" y="1083" width="321" height="155"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">One group per environment and app role; least privilege access</div></foreignObject><rect x="1290" y="1015" width="365" height="235" rx="22" fill="#FFEDD5" stroke="#CBD5E1" stroke-width="2"/><text x="1312" y="1057" class="h">Monitoring & Support</text><foreignObject x="1312" y="1083" width="321" height="155"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Flow failures, app errors, audit history, support queue, backup/restore</div></foreignObject><rect x="1680" y="1015" width="365" height="235" rx="22" fill="#DCFCE7" stroke="#CBD5E1" stroke-width="2"/><text x="1702" y="1057" class="h">Compliance & Operations</text><foreignObject x="1702" y="1083" width="321" height="155"><div xmlns="http://www.w3.org/1999/xhtml" style="font:17px Arial;color:#475569;line-height:1.45">Solution inventory, ownership, access review, retention, production change approvals</div></foreignObject><line x1="778" y1="360" x2="822" y2="360" stroke="#64748B" stroke-width="4" marker-end="url(#a)"/><line x1="1098" y1="360" x2="1142" y2="360" stroke="#64748B" stroke-width="4" marker-end="url(#a)"/><line x1="1418" y1="360" x2="1462" y2="360" stroke="#64748B" stroke-width="4" marker-end="url(#a)"/><line x1="1738" y1="360" x2="1782" y2="360" stroke="#64748B" stroke-width="4" marker-end="url(#a)"/><line x1="940" y1="837" x2="980" y2="837" stroke="#64748B" stroke-width="4" marker-end="url(#a)"/><line x1="1410" y1="837" x2="1450" y2="837" stroke="#64748B" stroke-width="4" marker-end="url(#a)"/><line x1="1285" y1="445" x2="1285" y2="500" stroke="#64748B" stroke-width="4" marker-end="url(#a)"/><rect x="90" y="1060" width="340" height="190" rx="22" fill="#0F172A"/><text x="115" y="1105" class="w">Portfolio Caption</text><foreignObject x="115" y="1130" width="285" height="110"><div xmlns="http://www.w3.org/1999/xhtml" style="font:18px Arial;color:#E2E8F0;line-height:1.45">Governed Power Platform architecture with developer, sandbox, DEV, TEST, PROD, pipelines, DLP, Entra groups, monitoring, and onboarding.</div></foreignObject></svg>